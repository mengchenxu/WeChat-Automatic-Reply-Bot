# Reasonix configuration.
# Resolution order: flag > ./reasonix.toml > ~/.config/reasonix/config.toml > built-in defaults.
# Secrets come from the environment via api_key_env; never put keys here.

config_version = 2   # schema marker for diagnostics; old versions may ignore it
default_model = "deepseek-flash"
# language      = "zh"   # ui/model language; empty = auto-detect from $LANG / $REASONIX_LANG

[agent]
# system_prompt = """..."""   # omit to use the built-in prompt for this version
# system_prompt_file = "prompts/system.md"   # overrides system_prompt when set
max_steps         = 0   # executor tool-call rounds; 0 = no limit
planner_max_steps = 12   # planner read-only tool-call rounds; 0 = no limit
temperature       = 0.0
auto_plan   = "off"   # off|on; off keeps plan mode manual
# auto_plan_classifier = "deepseek-flash"   # optional; only used for borderline tasks
soft_compact_ratio  = 0.5   # notice only; keeps cache-first prefix intact
compact_ratio       = 0.8   # try compacting when prompt reaches this fraction
compact_force_ratio = 0.9   # force compacting at this high-water mark
# planner_model = "mimo"   # optional: enable two-model collaboration
# subagent_model = "deepseek-pro"   # optional default for runAs=subagent skills
# subagent_models = { review = "deepseek-pro", security_review = "deepseek-pro" }   # per-skill overrides
# subagent_effort = "high"   # optional default effort for subagents
# subagent_efforts = { review = "max", task = "high" }   # per-tool/skill effort overrides
# output_style = "explanatory"   # explanatory | learning | concise | custom; empty = default

[tools]
enabled = []   # empty = all built-in tools
bash_timeout_seconds = 120   # foreground safety cap; set 0 for no tool-local cap

[codegraph]
enabled      = true   # built-in MCP server; off by default for first-run sessions
auto_install = true   # fetch the runtime when CodeGraph is enabled but missing
# path       = ""   # empty = cache, then PATH, then a bundle beside reasonix

[lsp]
enabled = true   # language server tools; servers launch lazily when used
# [lsp.servers.go]
# command = "gopls"
# args = []
# extensions = [".go"]

[skills]
# paths = ["~/my-skills", "../shared/skills"]   # extra custom skill roots
# excluded_paths = ["~/.agents/skills"]   # hide convention roots without deleting folders
# max_depth = 3   # nested scan depth; set 1 for legacy root-only discovery
# disabled_skills = ["review"]   # hide noisy or unwanted skills

[permissions]
# Per-call gating. mode = writer fallback when no rule matches: ask|allow|deny.
# Readers always default to allow. Precedence: deny > ask > allow > fallback.
# Rules are "Tool" or "Tool(specifier)"; e.g. Bash(go test:*), Edit(src/**).
mode  = "ask"
# deny = ["Bash(rm -rf*)", "Bash(git push*)"]   # hard-blocked in every mode
allow = ["Bash(git remote:*)", "Bash(git push:*)", "Bash(Get-ChildItem -Path \"$env:USERPROFILE\\.ssh\" -Filter \"id_*\" 2>$null | Select-Object Name)", "Bash(New-Item -ItemType Directory -Force -Path \"$env:USERPROFILE\\.ssh\" | Out-Null; ssh-keygen -t ed25519 -C \"wechat-bot\" -f \"$env:USERPROFILE\\.ssh\\id_ed25519\" -N '\"\"')", "Bash(Get-Content \"$env:USERPROFILE\\.ssh\\id_ed25519.pub\":*)", "Bash(git remote set-url origin git@github.com:mengchenxu/-.git ; git push -u origin master)", "Bash(ssh-keyscan github.com >> \"$env:USERPROFILE\\.ssh\\known_hosts\" 2>$null)", "Bash(echo \"yes\" | ssh -o StrictHostKeyChecking=accept-new git@github.com 2>&1)", "Bash(python --version 2>&1; pip --version 2>&1)", "Bash(python -m:*)", "Bash(.\\venv\\Scripts\\Activate.ps1 ; pip install -r requirements.txt)", "Bash(Copy-Item config\\config.yaml.example:*)", "Edit", "Bash(git add -A ; git commit -m \"chore: install dependencies\" ; git push)", "Bash(python main.py:*)", "Bash(Get-ItemProperty \"HKLM:\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\App Paths\\WeChat.exe\" -ErrorAction SilentlyContinue 2>$null | Select-Object -ExpandProperty \"(default)\" 2>$null ; Get-ItemProperty \"HKCU:\\SOFTWARE\\Tencent\\WeChat\" -ErrorAction SilentlyContinue 2>$null | Select-Object InstallPath 2>$null)", "Bash(Get-ChildItem \"C:\\Program Files\\Tencent\\WeChat\" -ErrorAction SilentlyContinue ; Get-ChildItem \"C:\\Program Files (x86)\\Tencent\\WeChat\" -ErrorAction SilentlyContinue ; Get-ItemProperty \"HKLM:\\SOFTWARE\\WOW6432Node\\Tencent\\WeChat\" -ErrorAction SilentlyContinue | Select-Object InstallPath ; Get-Process -Name WeChat -ErrorAction SilentlyContinue | Select-Object Id, ProcessName)", "Bash(if (Test-Path \"C:\\Program Files\\Tencent\\WeChat\") { Write-Host \"Found in Program Files\" } elseif (Test-Path \"C:\\Program Files (x86)\\Tencent\\WeChat\") { Write-Host \"Found in Program Files (x86)\" } else { Write-Host \"Not found in Program Files\" } ; Get-Process -Name WeChat -ErrorAction SilentlyContinue | ForEach-Object { $_.ProcessName })", "Bash(Get-ChildItem \"$env:USERPROFILE\\Desktop\" -Name -Filter \"*WeChat*\" -ErrorAction SilentlyContinue ; Get-ChildItem \"$env:USERPROFILE\\AppData\\Roaming\\Microsoft\\Windows\\Start Menu\\Programs\" -Recurse -Name -Filter \"*WeChat*\" -ErrorAction SilentlyContinue ; Get-ChildItem \"C:\\Users\" -Recurse -Directory -Name -Filter \"WeChat*\" -ErrorAction SilentlyContinue -Depth 2)", "Bash(Get-ChildItem \"$env:TEMP\" -Name -Filter \"*WeChat*\" -ErrorAction SilentlyContinue ; Get-ChildItem \"$env:USERPROFILE\\Downloads\" -Name -Filter \"*WeChat*\" -ErrorAction SilentlyContinue)", "Bash(pip install:*)", "Bash(git add -A ; git commit -m \"feat: migrate from WeChatFerry to WeFlow+UIA (supports WeChat 4.x)\n\n- Replace wcferry with weflow_client (SSE receive + UIA send)\n- Add uia_sender.py for Windows UI Automation\n- Rewrite bot_core.py to use WeFlowMessage\n- Update main.py, config, requirements.txt\" ; git push)", "Bash(try { $r = Invoke-WebRequest -Uri \"http://127.0.0.1:5031\" -TimeoutSec 2 -UseBasicParsing; Write-Host \"WeFlow 运行中: $($r.StatusCode)\" } catch { Write-Host \"WeFlow 未启动\" })", "Bash(Get-ChildItem \"$env:LOCALAPPDATA\\weflow*\" -Directory -ErrorAction SilentlyContinue | Select-Object Name ; Get-ChildItem \"$env:APPDATA\\weflow*\" -Directory -ErrorAction SilentlyContinue | Select-Object Name ; Get-ChildItem \"C:\\Users\\*\\AppData\\Local\\Programs\\weflow*\" -Directory -ErrorAction SilentlyContinue | Select-Object FullName)", "task", "Bash(git add -A ; git commit -m \"feat: Adopt Akasha-WeChat architecture (WeFlow SSE + mature UIA + Web panel)\n\n- Replace UIA sender with Akasha-WeChat's robust implementation\n- Add message buffering engine with dedup & self-filtering\n- Add Web control panel (status monitor, config editor, mode switch)\n- Add shared state module for web panel communication\n- Rewrite main.py full pipeline: WeFlow -> BotCore -> LLM -> UIA\n- Update requirements.txt\" ; git push)", "Bash(node --version 2>&1; npm --version 2>&1)", "Bash(git clone https://github.com/hicccc77/WeFlow.git weflow-build 2>&1)", "Bash(if (Test-Path weflow-build) { Write-Host \"exists\" } else { Write-Host \"not found\" } ; Get-ChildItem weflow-build -ErrorAction SilentlyContinue | Select-Object Name)", "Bash(Remove-Item -Recurse -Force weflow-build -ErrorAction SilentlyContinue ; git clone https://github.com/hicccc77/WeFlow.git weflow-build)", "Bash(Get-ChildItem weflow-build -Directory -ErrorAction SilentlyContinue | Select-Object Name ; Get-ChildItem weflow-build\\package.json -ErrorAction SilentlyContinue)", "Bash(Get-ChildItem weflow-build -Recurse -Depth 1 | Select-Object Name, Mode)", "Bash(Remove-Item -Recurse -Force weflow-build -ErrorAction SilentlyContinue ; git clone --depth 1 https://github.com/hicccc77/WeFlow.git weflow-build)", "Bash(Get-ChildItem weflow-build -Directory | Select-Object -First 10 Name)", "Bash(Remove-Item -Recurse -Force weflow-build -ErrorAction SilentlyContinue ; Invoke-WebRequest -Uri \"https://github.com/hicccc77/WeFlow/archive/refs/heads/main.zip\" -OutFile \"weflow-main.zip\")", "Bash(Get-ChildItem \"$env:APPDATA\\weflow\" -Filter \"*.log\" -ErrorAction SilentlyContinue | Select-Object FullName ; Get-ChildItem \"$env:APPDATA\\weflow\\logs\" -Filter \"*.log\" -ErrorAction SilentlyContinue | Select-Object -First 3 FullName)", "Bash(Get-Content \"$env:APPDATA\\weflow\\WeFlow-config.json\":*)", "Bash($raw = Get-Content \"$env:APPDATA\\weflow\\WeFlow-config.json\" -Raw ; $raw = $raw -replace '\"messagePushEnabled\":  true', '\"messagePushEnabled\": false' ; $raw = $raw -replace '\"messagePushEnabled\": true', '\"messagePushEnabled\": false' ; $raw = $raw -replace '\":  ', '\": ' ; Set-Content \"$env:APPDATA\\weflow\\WeFlow-config.json\" -Value $raw -Encoding utf8 -NoNewline ; Write-Host \"Restored\")", "Bash(try { Invoke-WebRequest \"http://127.0.0.1:5031\" -TimeoutSec 2 -UseBasicParsing; \"ONLINE\" } catch { \"OFFLINE\" })", "Bash(try { $r = Invoke-WebRequest \"http://127.0.0.1:5031/api/v1/messages?limit=1\" -TimeoutSec 3 -UseBasicParsing; Write-Host \"API works: $($r.StatusCode)\" ; $r.Content[0..200] -join '' } catch { Write-Host \"API fail: $_\" })", "Bash(Remove-Item -Recurse -Force weflow-src -ErrorAction SilentlyContinue ; git clone https://github.com/Nixer-2301/WeFlowBackup.git weflow-src)", "Bash(Get-ChildItem weflow-src\\package.json -ErrorAction SilentlyContinue | ForEach-Object { \"Found package.json\" })", "Bash(Get-Process -Name WeFlow* -ErrorAction SilentlyContinue | Stop-Process -Force ; Remove-Item -Recurse -Force \"$env:APPDATA\\weflow\" -ErrorAction SilentlyContinue ; Write-Host \"Cleaned\")", "Bash(try { Invoke-WebRequest \"http://127.0.0.1:5031\" -TimeoutSec 2 -UseBasicParsing; \"UP\" } catch { \"DOWN\" })", "Bash(try { (Invoke-WebRequest \"http://127.0.0.1:5031\" -TimeoutSec 2 -UseBasicParsing).StatusCode ; \"WeFlow OK\" } catch { \"WeFlow still down\" })", "Bash(if (Test-Path \"$env:APPDATA\\weflow\") { Get-ChildItem \"$env:APPDATA\\weflow\" -Recurse -Filter \"*.log\" -ErrorAction SilentlyContinue | ForEach-Object { Write-Host \"=== $($_.Name) ===\" ; Get-Content $_.FullName -Tail 20 } } else { Write-Host \"No WeFlow appdata found - not installed yet\" })", "Bash($cfg = Get-Content \"$env:APPDATA\\weflow\\WeFlow-config.json\" -Raw | ConvertFrom-Json ; $cfg.httpApiEnabled = $true ; $cfg.httpApiPort = 5031 ; $cfg.messagePushEnabled = $true ; $cfg.httpApiToken = \"\" ; $json = $cfg | ConvertTo-Json -Depth 6 ; $json = $json -replace \"`r`n\", \"`n\" ; [System.IO.File]::WriteAllText(\"$env:APPDATA\\weflow\\WeFlow-config.json\", $json) ; Write-Host \"Config fixed - API enabled, Push enabled\")", "kill_shell", "Bash(git add -A ; git commit -m \"fix: only respond to @鼠鼠, limit 3 sentences\" ; git push ; python main.py)", "Bash($body = @{sessionId=\"43495935852@chatroom\";content=\"测试消息\"} | ConvertTo-Json ; try { $r = Invoke-WebRequest \"http://127.0.0.1:5031/api/v1/message?access_token=weflow-bot-2024\" -Method POST -Body $body -ContentType \"application/json\" -TimeoutSec 5 -UseBasicParsing ; Write-Host \"$($r.StatusCode): $($r.Content)\" } catch { Write-Host \"Error: $($_.Exception.Response.StatusCode.value__) $($_.Exception.Message)\" })", "Bash(git add -A ; git commit -m \"fix: skip contact switch in UIA sender, send to active window\" ; git push ; python main.py)"]
# ask = ["Edit(src/**)"]   # force a prompt even if otherwise allowed

[sandbox]
# Confine tool blast radius. File-writers (write_file/edit_file/multi_edit)
# may only write under workspace_root (empty = current dir) + allow_write.
# bash = "enforce" (default) jails each command in an OS sandbox (macOS now;
# graceful fallback elsewhere); "off" disables it. network allows egress.
# workspace_root = ""            # default: current working directory
# allow_write = ["/tmp"]          # extra dirs writers may also modify
bash    = "enforce"
network = true

[statusline]
# A custom status line: a command whose first stdout line replaces the built-in
# data row. It receives {"model","contextUsed","contextWindow","cwd"} as JSON on stdin.
# command = "my-statusline.sh"

# External MCP servers. type: "stdio" (default, a subprocess) | "http" | "sse".
# ${VAR} / ${VAR:-default} are expanded from the environment in command/args/env/url/headers.
# [[plugins]]
# name    = "example"
# command = "reasonix-plugin-example"
# [[plugins]]                                  # a remote server over Streamable HTTP
# name    = "stripe"
