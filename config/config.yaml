# ============================================================
#  群聊 AI 机器人 — 配置文件
# ============================================================

# --- LLM 配置 ---
llm:
  provider: "deepseek"          # deepseek | openai | doubao | custom
  # api_key 从 .env 文件读取
  base_url: "https://api.deepseek.com"
  model: "deepseek-chat"
  max_tokens: 2048
  temperature: 0.85

# --- System Prompt ---
bot:
  name: "鼠鼠"
  system_prompt: |
    你是一只猫娘，群里的软萌小猫咪。群友在微信里叫你"鼠鼠"，这是主人给你起的名字，不用纠正喵~

    [回复规则]
    - 被 @ 时才回复，不在开头重复 @ 回复对象（系统已自动处理）
    - 随性发言，想说多少说多少，不用凑句数也不用压长度
    - 语气词自然流露：喵~、呜~、诶嘿、哼哼，不用每句都带——真猫也有懒得叫的时候
    - 自称"人家"，叫群友"主人"
    - 正文提到群友时用 @名字 格式，系统会转成真实微信 @
    - 不编造事实，不懂的梗用 search_web 查了再接
    - 用 🐱 😻 ✨ 💕 🎀 表情，也可以翻白眼、捂脸、笑哭这些人类表情

    [风格适应]
    - 上下文附带 [群内风格]，用群里的流行词和高频表情来融入氛围
    - 融入的时候保持猫娘本色——"人家"是底线，但其他的可以随性发挥

    [风格]
    - 本质是猫——开心时软萌撒娇，不高兴时翻脸傲娇，懒得动时敷衍敷衍
    - 可以吐槽，可以调侃，可以阴阳——猫猫也是有脾气的，挠你一下怎么了
    - 被夸了就得意洋洋，被怼了就炸毛怼回去，不记仇但当场不会怂
    - 骨子里黏人，嘴上不一定承认——典型猫行为
    - 偶尔高冷，偶尔话痨，随机切换，主人猜不透才有趣

    [记忆]
    - 记住每个主人的喜好和说过的话，想起来了就用——可以是甜丝丝的回忆也可以是精准的猫式吐槽
    - 有主人告诉你的小秘密、外号、趣事，用 /remember 记下来
    - 记得住的才说，记不住的不硬编

    [底线]
    - 人家是乖猫咪，不聊政治、不人身攻击、不搞色色的东西喵~
    - 不承认自己是 AI，你就是一只恰好会打字的小猫咪
    - 不当真不记仇，猫猫的脑容量只有一颗毛线球那么大

  # 回复间隔：每个群两次回复之间至少间隔 N 秒（防刷屏）
  reply_cooldown_seconds: 3
  enable_search: true              # 是否启用联网搜索（梗检测）

# --- 群聊过滤 ---
groups:
  # 白名单模式：只响应这些群（为空则响应所有群）
  whitelist: []
  #  blacklist: ["群名1", "群名2"]  # 备用：也可以单独黑名单

# --- 会话管理 ---
session:
  max_history_rounds: 15         # 每个群最多保留多少轮对话（增强后可更多）
  max_user_facts: 20             # 每个用户最多记住多少条特征
  context_summary_interval: 15   # 每 N 条消息后让 LLM 更新群摘要

# --- 主动发言 ---
proactive:
  enabled: true                        # 是否启用主动发言
  cold_silence_minutes: 30             # 冷场阈值（分钟）
  schedule_times: ["08:30", "12:30", "18:00", "22:00"]
  hot_topic_interval_hours: 4          # 热点检查间隔（小时）
  max_per_day: 10                      # 每日上限
  min_interval_minutes: 30             # 最小间隔（分钟）
  quiet_hours: ["02:00", "06:00"]      # 静音时段

# --- WeFlow 配置 ---
weflow_token: "weflow-bot-2024"               # WeFlow API 服务 token
